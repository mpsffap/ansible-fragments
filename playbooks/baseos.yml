---
- name: Setup base os (Debian)
  hosts: target_hosts
  become: true
  vars:
    enable_init: "true"

    # Optionals
    enable_optionals: "true"
    enable_optionals_archives: "true"
    enable_optionals_build: "true"
    enable_optionals_fm: "true"
    enable_optionals_networking: "true"
    enable_optionals_stats: "true"
    enable_optionals_terminal: "true"

    # Hardening
    enable_harden: "true"
    enable_harden_apparmor: "true"
    enable_harden_auditing: "true"
    enable_harden_firewall: "true"
  vars_files:
    - "../roles/baseos/vars/vars_baseos.yml"
  roles:
    - baseos
