---
- name: EXTRAS-OPTIONAL-DEV-DOTNET - Create mps folders
  when: user != {}
  block:
    - name: EXTRAS-OPTIONAL-DEV-DOTNET - Download dotnet-install.sh script
      ansible.builtin.get_url:
        url: "{{ url_dotnet_installer }}"
        dest: /tmp/dotnet-install.sh
        owner: "{{ user.name }}"
        group: "{{ user.name }}"
        mode: "0700"

    - name: EXTRAS-OPTIONAL-DEV-DOTNET - Make the dotnet-install.sh script executable
      ansible.builtin.file:
        path: /tmp/dotnet-install.sh
        mode: "u+x"

    - name: EXTRAS-OPTIONAL-DEV-DOTNET - Run dotnet-install.sh script
      ansible.builtin.command: /tmp/dotnet-install.sh --version latest

    - name: EXTRAS-OPTIONAL-DEV-DOTNET - Remove dotnet-install.sh script
      ansible.builtin.file:
        path: /tmp/dotnet-install.sh
        state: absent
