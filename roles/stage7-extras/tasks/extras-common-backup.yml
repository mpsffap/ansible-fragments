- name: Backup Brave bookmarks
  become: true
  become_user: "{{ user.name }}"
  ansible.builtin.copy:
    src: "{{ src_backup }}/brave/Bookmarks"
    dest: "{{ user.home }}/.config/BraveSoftware/Brave-Browser/Default/Bookmarks"
    mode: "0600"
  when: backup_persist_brave

- name: EXTRAS-COMMON-BACKUP - Copy homedir
  ansible.posix.synchronize:
    src: "{{ src_backup }}/home/"
    dest: "{{ user.home }}/"
    recursive: true
    delete: false
  become: true
  become_user: "{{ user.name }}"
