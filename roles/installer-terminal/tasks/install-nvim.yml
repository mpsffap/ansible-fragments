- name: Install nvim
  ansible.builtin.apt:
    name:
      - python3-pip
      - lazygit
      - npm
      - git
      - make
      - gcc
      - gdb
      - wget
      - bzip2
      - curl
      - build-essential
      - lldb
      - libncurses-dev
      - ruby
      - npm
      - fzf
      - fd-find
      - rr
      - ripgrep
      - shellcheck
      - xclip
      - xsel
      - luarocks
      - chktex
      - python3
      - python3-venv
      - python3-pip
      - black
      - flake8
      - pylint
      - mypy
      - python3-neovim
      - python3-pynvim
  become: true

- name: Install pip packages
  ansible.builtin.pip:
    name:
      # - ruff-lsp
      - debugpy
      - pynvim
    state: present
    extra_args: "--break-system-packages"
  # become: true

# - name: Install npm packages globally
#   ansible.builtin.shell:
#   cmd: "npm install -g neovim vint luacheck"
#   become: true

- name: Create directory for Neovim installation
  ansible.builtin.file:
    path: "{{ dst_neovim }}"
    state: directory
    mode: "0755"

- name: Download Neovim tarball
  ansible.builtin.get_url:
    url: "{{ url_neovim }}"
    dest: "{{ dst_neovim }}/nvim-linux-x86_64.tar.gz"

- name: Extract Neovim tarball
  ansible.builtin.unarchive:
    src: "{{ dst_neovim }}/nvim-linux-x86_64.tar.gz"
    dest: "{{ dst_neovim }}/"
    remote_src: true

- name: Remove nvim package binary
  ansible.builtin.file:
    path: "/usr/bin/nvim"
    state: absent

- name: Create symlink for nvim
  ansible.builtin.file:
    src: "{{ dst_neovim }}/nvim-linux-x86_64/bin/nvim"
    dest: "/usr/local/bin/nvim"
    state: link

- name: Copy bash config if needed
  block:
    - name: Copy nvim config
      ansible.builtin.copy:
        src: "{{ src_dotfiles }}/.config/nvim"
        dest: "{{ user.home }}/.config"
        owner: "{{ user.name }}"
        group: "{{ user.name }}"
        mode: "0700"

    - name: Create session folder
      ansible.builtin.file:
        path: "{{ user.home }}/.config/nvim-session"
        state: directory
        owner: "{{ user.name }}"
        group: "{{ user.name }}"
        mode: "0700"
  when: user != {}
