---
# --------------------------------------------------
# Detect docker
# --------------------------------------------------
- name: Check if docker exists
  ansible.builtin.command: which docker
  register: docker_check
  failed_when: false
  changed_when: false

- name: Set docker flag
  ansible.builtin.set_fact:
    firewall_docker_present: "{{ docker_check.rc == 0 and firewall_with_docker }}"

- name: Set INPUT policy
  ansible.builtin.iptables:
    chain: INPUT
    policy: "ACCEPT"

- name: Set OUTPUT policy
  ansible.builtin.iptables:
    chain: OUTPUT
    policy: "ACCEPT"

- name: Set FORWARD policy
  ansible.builtin.iptables:
    chain: FORWARD
    policy: "ACCEPT"

# --------------------------------------------------
# Flush existing rules (MODULE ✔)
# --------------------------------------------------
- name: Flush filter table chains
  ansible.builtin.iptables:
    table: filter
    chain: "{{ item }}"
    flush: yes
  loop:
    - INPUT
    - OUTPUT
    - FORWARD

- name: Flush nat table chains (optional but safer)
  ansible.builtin.iptables:
    table: nat
    chain: "{{ item }}"
    flush: yes
  loop:
    - PREROUTING
    - POSTROUTING
    - OUTPUT

# --------------------------------------------------
# Delete custom chains (still required ❗)
# --------------------------------------------------
# - name: Delete custom chains
#   ansible.builtin.command: iptables -X
#   ignore_errors: true

# --------------------------------------------------
# Restart docker
# --------------------------------------------------
- name: Restart docker if present
  ansible.builtin.service:
    name: docker
    state: restarted
  when: firewall_docker_present

# --------------------------------------------------
# Loopback
# --------------------------------------------------
- name: Allow loopback INPUT
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT

- name: Allow loopback OUTPUT
  ansible.builtin.iptables:
    chain: OUTPUT
    out_interface: lo
    jump: ACCEPT

# --------------------------------------------------
# Established connections
# --------------------------------------------------
- name: Allow established INPUT
  ansible.builtin.iptables:
    chain: INPUT
    ctstate:
      - ESTABLISHED
      - RELATED
    jump: ACCEPT

- name: Allow established OUTPUT
  ansible.builtin.iptables:
    chain: OUTPUT
    ctstate:
      - ESTABLISHED
      - RELATED
    jump: ACCEPT

# --------------------------------------------------
# ICMP
# --------------------------------------------------
- name: Allow ICMP INPUT
  ansible.builtin.iptables:
    chain: INPUT
    protocol: icmp
    jump: ACCEPT
  when: firewall_allow_icmp

- name: Allow ICMP OUTPUT
  ansible.builtin.iptables:
    chain: OUTPUT
    protocol: icmp
    jump: ACCEPT
  when: firewall_allow_icmp

# --------------------------------------------------
# TCP ports
# --------------------------------------------------
- name: Allow TCP ports
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    ctstate: NEW
    jump: ACCEPT
  loop: "{{ firewall_tcp_ports }}"

# --------------------------------------------------
# UDP ports
# --------------------------------------------------
- name: Allow UDP ports
  ansible.builtin.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ item }}"
    ctstate: NEW
    jump: ACCEPT
  loop: "{{ firewall_udp_ports }}"

# --------------------------------------------------
# Policies
# --------------------------------------------------
- name: Set INPUT policy
  ansible.builtin.iptables:
    chain: INPUT
    policy: "{{ firewall_policies.input }}"

- name: Set OUTPUT policy
  ansible.builtin.iptables:
    chain: OUTPUT
    policy: "{{ firewall_policies.output }}"

- name: Set FORWARD policy
  ansible.builtin.iptables:
    chain: FORWARD
    policy: "{{ firewall_policies.forward }}"

# --------------------------------------------------
# Ensure rules directory exists
# --------------------------------------------------
- name: Create rules directory
  ansible.builtin.file:
    path: "{{ firewall_rules_dir }}"
    state: directory
    mode: "0755"

- name: Ensure IP forwarding is configured via sysctl
  ansible.builtin.sysctl:
    name: net.ipv4.ip_forward
    value: "{{ 1 if nat_enable_ip_forwarding else 0 }}"
    state: present
    reload: true
  when: nat_enable_ip_forwarding

- name: Ensure masquerading rule exists
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ nat_source_network }}"
    out_interface: "{{ nat_out_interface }}"
    jump: MASQUERADE
    state: present
    comment: "ansible-nat"
    rule_num: 1
  when: nat_enable_ip_forwarding

- name: Allow forwarding from internal network to WAN
  ansible.builtin.iptables:
    chain: FORWARD
    source: "{{ nat_source_network }}"
    out_interface: "{{ nat_out_interface }}"
    jump: ACCEPT
    state: present
    rule_num: 1

# --------------------------------------------------
# Save rules (still required ❗)
# --------------------------------------------------
- name: Save iptables rules
  ansible.builtin.shell: iptables-save > {{ firewall_rules_path }}

# --------------------------------------------------
# Systemd service
# --------------------------------------------------
- name: Deploy iptables systemd service
  ansible.builtin.template:
    src: "{{ src_etcfiles }}/systemd/iptables.service.j2"
    dest: "/etc/systemd/system/{{ firewall_service_name }}.service"
    mode: "0644"

- name: Enable service
  ansible.builtin.service:
    name: "{{ firewall_service_name }}"
    enabled: true

- name: Restart service
  ansible.builtin.service:
    name: "{{ firewall_service_name }}"
    state: restarted
