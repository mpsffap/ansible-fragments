---
- name: THEMES-OPTIONAL-GRUB - Copy grub themes
  ansible.builtin.copy:
    src: "{{ src_themefiles }}/{{ theme }}"
    dest: "{{ dst_themefiles }}/"
    owner: "root"
    group: "root"
    mode: "0744"
  loop: "{{ grub_themes }}"
  loop_control:
    loop_var: "theme"
  when: grub_themes is defined

- name: THEMES-OPTIONAL-GRUB - Copy grub icons
  ansible.builtin.copy:
    src: "{{ src_iconfiles }}/{{ icon }}"
    dest: "{{ dst_iconfiles }}/"
    owner: "root"
    group: "root"
    mode: "0700"
  loop: "{{ grub_icons }}"
  loop_control:
    loop_var: "icon"
  when: grub_icons is defined

- name: THEMES-OPTIONAL-GRUB - Ensure GRUB_GFXMODE
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: "^GRUB_GFXMODE="
    line: "GRUB_GFXMODE=1920x1080"
    state: present

- name: THEMES-OPTIONAL-GRUB - Ensure GRUB_THEME
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: "^GRUB_THEME="
    line: 'GRUB_THEME="/boot/grub/themes/{{ grub_theme }}/theme.txt"'
    state: present

- name: THEMES-OPTIONAL-GRUB - Ensure Hostname
  ansible.builtin.lineinfile:
    path: "/boot/grub/themes/{{ grub_theme }}/theme.txt"
    regexp: 'text = "Host: CFG_HOST"'
    line: '  text = "Host: {{ inventory_hostname }}"'
    state: present

- name: THEMES-OPTIONAL-GRUB - Ensure Version
  ansible.builtin.lineinfile:
    path: "/boot/grub/themes/{{ grub_theme }}/theme.txt"
    regexp: 'text = "VERSION: CFG_VERSION"'
    line: '  text = "VERSION: {{ app_version }}"'
    state: present

- name: THEMES-OPTIONAL-GRUB - Update grub
  become: true
  ansible.builtin.command: update-grub
  register: cmdoutput
  changed_when: cmdoutput.rc == 0
