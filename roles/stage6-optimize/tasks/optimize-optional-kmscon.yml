---
- name: OPTIMIZE-OPTIONAL-KMSCON - Install kmscon with required backports dependency
  become: true
  ansible.builtin.apt:
    name:
      - kmscon
      - libtsm4
    state: present
    default_release: trixie-backports
    update_cache: true

- name: OPTIMIZE-OPTIONAL-KMSCON - Create kmscon folder
  ansible.builtin.file:
    path: "/etc/kmscon"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "0755"

- name: OPTIMIZE-OPTIONAL-KMSCON - Copy config file
  ansible.builtin.copy:
    src: "{{ src_etcfiles }}/kmscon/kmscon.conf"
    dest: "/etc/kmscon"
    owner: "root"
    group: "root"
    mode: "0755"
