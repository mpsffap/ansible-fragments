- name: TERMINAL-BASE-BASH - Copy bash config if needed

  block:
    - name: TERMINAL-BASE-BASH - bash essential packages
      ansible.builtin.apt:
        name:
          - cowsay
          - figlet
          - fortune
          - fortunes-de
          - cmatrix
          - bash-completion
        state: present
      become: true
    - name: TERMINAL-BASE-BASH - Copy common bash aliases
      ansible.builtin.copy:
        src: "{{ src_etcfiles }}/bash_aliases"
        dest: "/etc/"
        owner: "root"
        group: "root"
        mode: "0755"
    - name: TERMINAL-BASE-BASH - Copy bash config
      ansible.builtin.copy:
        src: "{{ src_dotfiles }}/.bashrc"
        dest: "{{ user.home }}/"
        owner: "{{ user.name }}"
        group: "{{ user.name }}"
        mode: "0700"

    - name: TERMINAL-BASE-BASH - Copy bash config
      ansible.builtin.copy:
        src: "{{ src_dotfiles }}/.config/bashrc"
        dest: "{{ user.home }}/.config"
        owner: "{{ user.name }}"
        group: "{{ user.name }}"
        mode: "0700"

    - name: TERMINAL-BASE-BASH - Check if .bash_logout exists
      ansible.builtin.stat:
        path: "{{ user.home }}/.bash_logout"
      ignore_errors: true
      register: bash_logout_stat

    - name: TERMINAL-BASE-BASH - Copy .bash_logout to a custom location
      ansible.builtin.copy:
        src: "{{ user.home }}/.bash_logout"
        dest: "{{ user.home }}/.config/bashrc/.bash_logout"
        remote_src: true
        mode: "0700"
      when: bash_logout_stat.stat.exists

    - name: TERMINAL-BASE-BASH - Remove the original .bash_logout file
      ansible.builtin.file:
        path: "{{ user.home }}/.bash_history"
        state: absent

    - name: TERMINAL-BASE-BASH - Remove the original .bash_logout file
      ansible.builtin.file:
        path: "{{ user.home }}/.bash_logout"
        state: absent

    - name: TERMINAL-BASE-BASH - Remove old bashrc_alias file
      ansible.builtin.file:
        path: "{{ user.home }}/.bashrc_aliases"
        state: absent

    - name: TERMINAL-BASE-BASH - Remove old bash_alias file
      ansible.builtin.file:
        path: "{{ user.home }}/.bash_aliases"
        state: absent
