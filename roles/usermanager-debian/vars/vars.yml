---
user_print_plain: true

sudo_macros:
  ADMIN_DEFAULT:
    - "/usr/bin/apt update *"
    - "/usr/bin/systemctl daemon-reload"
    - "/usr/bin/systemctl status *"
    - "/usr/bin/systemctl list-units *"
    - "/usr/bin/systemctl list-timers *"
    - "/usr/bin/journalctl *"
    - "/usr/bin/journalctl -u *"
    - "/usr/bin/systemctl show *"
    - "/usr/bin/df *"
    - "/usr/bin/du *"
    - "/usr/sbin/lsblk *"
    - "/usr/bin/netstat *"
    - "/usr/bin/which *"
    - "/usr/bin/cat /etc/hosts"
    - "/usr/bin/cat /etc/resolv.conf"
    - "/usr/bin/cat /etc/network/interfaces"
    - "/usr/sbin/route -n"
    - "/usr/sbin/iptables -L *"
    - "/usr/sbin/brctl show *"
    - "/usr/bin/systemctl restart"
    - "/usr/sbin/poweroff"
    - "/usr/sbin/reboot"
  ADMIN_DEBUG:
    - "/bin/sh *"
    - "/bin/bash *"
    - "/usr/bin/apt *"
    - "/usr/lib/apt/methods/http *"
    - "/usr/bin/tee *"
    - "/usr/bin/batcat *"
    - "/usr/bin/cat *"
    - "/usr/bin/vi *"
    - "/usr/bin/vim *"
    - "/usr/bin/nano *"
    - "/usr/sbin/route *"
    - "/usr/sbin/iptables *"
    - "/usr/sbin/brctl *"

users:
  - name: alice
    # uid: 1000
    # gid: 1000
    group: "alice"
    home: /home/alice
    groups: ["admin", "config", "foobar"]
    append_groups: true
    comment: "Alice Admin"
    shell: /bin/bash
    create_home: true
    system: false
    expires: -1
    # password: ""
    password: "alicepass"
    # password: "$6$rounds=656000$TyhD0QYWPJgvbaOz$D6N9XwQNhlmUi2h4.Fp7CMBvAqr1b/uTBzCn2fO9Pd1aeFxdeDUSO2y.o./CHqD5sLUBW.veBRVLNGl7n2OLG1"
    state: present
    # state: absent
    sudo:
      nopasswd: false
      macros:
        - ADMIN_DEFAULT
        - ADMIN_DEBUG
    ssh_keys:
      - name: id_rsa
        path: ../vars/dummy/id_rsa
        # content: "-----BEGIN RSA PRIVATE KEY-----..."
      - name: id_rsa.pub
        path: ../vars/dummy/id_rsa.pub
        # content: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..."
    authorized_keys:
      - path: ../vars/dummy/authorized_keys
      # - content: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..."
